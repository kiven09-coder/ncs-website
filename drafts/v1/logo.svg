  <!-- NCS text — white fill with thick black outline -->
  <text
    x="100" y="125"
    font-family="Inter, 'Helvetica Neue', system-ui, sans-serif"
    font-weight="900"
    font-size="66"
    fill="#ffffff"
    stroke="#0a0a0a"
    stroke-width="4"
    paint-order="stroke fill"
    stroke-linejoin="round"
    text-anchor="middle"
    letter-spacing="-2"
  >NCS</text>
</svg>
