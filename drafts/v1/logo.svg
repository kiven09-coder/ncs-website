      <path d="M 12 102 Q 50 94 95 86" stroke-width="5"/>
      <path d="M 22 114 Q 55 106 92 100" stroke-width="3"/>
      <path d="M 8 126 Q 45 118 85 112" stroke-width="4"/>
      <path d="M 16 138 Q 48 132 80 128" stroke-width="2"/>
      <path d="M 10 150 Q 40 145 70 142" stroke-width="3"/>
      <path d="M 24 22 Q 70 14 140 4"  stroke-width="2"/>
      <path d="M 30 50 Q 62 42 100 38" stroke-width="2"/>
      <path d="M 30 80 Q 60 72 95 68"  stroke-width="2"/>
    </g>

    <!-- Black scribble brush strokes (bottom-right to center) -->
