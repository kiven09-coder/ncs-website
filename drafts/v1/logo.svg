      <path d="M 115 195 Q 155 178 195 152" stroke-width="5"/>
      <path d="M 105 184 Q 148 166 195 142" stroke-width="4"/>
      <path d="M 95 172 Q 140 154 195 130"  stroke-width="6"/>
      <path d="M 88 158 Q 135 142 195 118"  stroke-width="5"/>
      <path d="M 92 144 Q 138 128 195 106"  stroke-width="4"/>
      <path d="M 100 132 Q 142 116 195 94"  stroke-width="3"/>
      <path d="M 108 120 Q 145 106 195 82"  stroke-width="5"/>
      <path d="M 116 110 Q 150 96 195 70"   stroke-width="3"/>
      <path d="M 124 100 Q 155 88 195 62"   stroke-width="4"/>
      <path d="M 132 92 Q 158 80 195 56"    stroke-width="2"/>
      <path d="M 140 84 Q 162 74 195 48"    stroke-width="3"/>
      <path d="M 148 76 Q 168 66 196 40"    stroke-width="2"/>
      <path d="M 70 178 Q 110 162 150 152"  stroke-width="2"/>
      <path d="M 105 150 Q 140 138 175 130" stroke-width="2"/>
